service:
  name: "QA Intelligence Agent"
  version: "0.1.0"
  port: 8000

teamcity:
  url: ""  # Set via TEAMCITY_URL env var or here
  # auth token set via TEAMCITY_TOKEN env var

webhook:
  # How long to keep processed build IDs in memory (seconds)
  dedup_window: 3600

processing:
  # Branch patterns to process (fnmatch-style)
  branch_filters:
    - "main"
    - "master"
    - "release/*"
  # Max retry attempts on processing failure
  max_retries: 3
  # Base delay for exponential backoff (seconds)
  retry_base_delay: 5

startup:
  # How many recent builds to check on startup for missed events
  poll_lookback_builds: 20

logging:
  level: "INFO"
